services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pi}
      POSTGRES_USER: ${POSTGRES_USER:-pi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pi} -d ${POSTGRES_DB:-pi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pi-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PI_PORT:-3000}:3000"
    environment:
      PI_PORT: 3000
      PI_HOST: 0.0.0.0
      PI_DATABASE_URL: postgres://${POSTGRES_USER:-pi}:${POSTGRES_PASSWORD:-pi}@postgres:5432/${POSTGRES_DB:-pi}
      PI_API_KEY: ${PI_API_KEY:-}
      PI_CWD: /workspace
      PI_MODEL: ${PI_MODEL:-}
      PI_WEB_ROOT: /app/packages/web-ui/dist
      # Provider credentials are read from the agent state dir mounted below,
      # or pass them through here as needed (e.g. ANTHROPIC_API_KEY).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      # Agent workspaces (files the agent reads/writes) persisted on the host.
      - ./workspace:/workspace
      # Agent state: sessions JSONL + provider auth (~/.pi inside the container).
      - ./state:/root/.pi
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
